name: OpenClaw Phase Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  phase-gate:
    runs-on: ubuntu-latest
    env:
      OPENCLAW_TOKEN: ${{ secrets.OPENCLAW_TOKEN }}
      TENANT_ID: ${{ secrets.TENANT_ID }}
      BASE_URL: ${{ secrets.OPENCLAW_BASE_URL || 'https://localos.pro' }}
      OPENCLAW_CI_STRICT: ${{ secrets.OPENCLAW_TOKEN != '' && secrets.TENANT_ID != '' && '1' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements.test.txt ]; then pip install -r requirements.test.txt; fi

      - name: Run OpenClaw CI gate
        run: |
          chmod +x scripts/ci_gate_openclaw_phase1.sh
          ./scripts/ci_gate_openclaw_phase1.sh
