# Один и тот же compose для локального и серверного запуска.
# Postgres и приложение — в разных контейнерах; данные БД — в volume.

services:
  postgres:
    image: pgvector/pgvector:0.8.0-pg16-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beautybot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautybot}
      POSTGRES_DB: ${POSTGRES_DB:-beautybot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beautybot} -d ${POSTGRES_DB:-beautybot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      network: host
    restart: unless-stopped
    environment:
      DEBUG_DIR: /app/debug_data
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautybot}:${POSTGRES_PASSWORD:-beautybot}@postgres:5432/${POSTGRES_DB:-beautybot}
      FLASK_APP: src.main:app
      APP_ENV: ${APP_ENV:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
      FRONTEND_DIST_DIR: /app/frontend/dist
      PUBLIC_FRONTEND_DIST_DIR: /app/frontend/public-dist
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      RATE_LIMITING_ENABLED: ${RATE_LIMITING_ENABLED:-true}
      RATE_LIMIT_STORAGE_URI: ${RATE_LIMIT_STORAGE_URI:-memory://}
      PUBLIC_DEMO_ENABLED: ${PUBLIC_DEMO_ENABLED:-false}
      PUBLIC_DEMO_USER_ID: ${PUBLIC_DEMO_USER_ID:-}
      PUBLIC_DEMO_BUSINESS_ID: ${PUBLIC_DEMO_BUSINESS_ID:-}
      PUBLIC_DEMO_ROOM_SLUG: ${PUBLIC_DEMO_ROOM_SLUG:-}
      DEMO_SESSION_TTL_DAYS: ${DEMO_SESSION_TTL_DAYS:-30}
      EXTERNAL_AUTH_SECRET_KEY: ${EXTERNAL_AUTH_SECRET_KEY:-}
      OUTREACH_EMAIL_SECRET_KEY: ${OUTREACH_EMAIL_SECRET_KEY:-}
      POSTGRES_USER: ${POSTGRES_USER:-beautybot}
      POSTGRES_DB: ${POSTGRES_DB:-beautybot}
      PYTHONPATH: /app:/app/src
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      APIFY_YANDEX_ACTOR_ID: ${APIFY_YANDEX_ACTOR_ID:-}
      APIFY_2GIS_ACTOR_ID: ${APIFY_2GIS_ACTOR_ID:-}
      APIFY_TWOGIS_ACTOR_ID: ${APIFY_TWOGIS_ACTOR_ID:-}
      APIFY_PROXY_URL: ${APIFY_PROXY_URL:-}
      APIFY_HTTP_PROXY: ${APIFY_HTTP_PROXY:-}
      APIFY_HTTPS_PROXY: ${APIFY_HTTPS_PROXY:-}
      APIFY_PROXY_GROUPS: ${APIFY_PROXY_GROUPS:-RESIDENTIAL}
      APIFY_PROXY_STRICT: ${APIFY_PROXY_STRICT:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_REVIEWS_BOT_TOKEN: ${TELEGRAM_REVIEWS_BOT_TOKEN:-}
      OUTBOUND_HTTP_PROXY: ${OUTBOUND_HTTP_PROXY:-}
      TELEGRAM_HTTP_PROXY: ${TELEGRAM_HTTP_PROXY:-}
      TELEGRAM_USERBOT_PROXY: ${TELEGRAM_USERBOT_PROXY:-}
