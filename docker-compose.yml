# Один и тот же compose для локального и серверного запуска.
# Postgres и приложение — в разных контейнерах; данные БД — в volume.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beautybot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beautybot}
      POSTGRES_DB: ${POSTGRES_DB:-beautybot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beautybot} -d ${POSTGRES_DB:-beautybot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DEBUG_DIR: /app/debug_data
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautybot}:${POSTGRES_PASSWORD:-beautybot}@postgres:5432/${POSTGRES_DB:-beautybot}
      FLASK_APP: src.main:app
      POSTGRES_USER: ${POSTGRES_USER:-beautybot}
      POSTGRES_DB: ${POSTGRES_DB:-beautybot}
      PYTHONPATH: /app:/app/src
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      APIFY_YANDEX_ACTOR_ID: ${APIFY_YANDEX_ACTOR_ID:-}
      APIFY_2GIS_ACTOR_ID: ${APIFY_2GIS_ACTOR_ID:-}
      APIFY_TWOGIS_ACTOR_ID: ${APIFY_TWOGIS_ACTOR_ID:-}
      APIFY_PROXY_URL: ${APIFY_PROXY_URL:-}
      APIFY_HTTP_PROXY: ${APIFY_HTTP_PROXY:-}
      APIFY_HTTPS_PROXY: ${APIFY_HTTPS_PROXY:-}
      APIFY_PROXY_GROUPS: ${APIFY_PROXY_GROUPS:-RESIDENTIAL}
      APIFY_PROXY_STRICT: ${APIFY_PROXY_STRICT:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/legacy.sqlite:/app/legacy.sqlite:ro
      - ./debug_data:/app/debug_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "src/main.py"]

  worker:
    build: .
    environment:
      DEBUG_DIR: /app/debug_data
      DATABASE_URL: postgresql://${POSTGRES_USER:-beautybot}:${POSTGRES_PASSWORD:-beautybot}@postgres:5432/${POSTGRES_DB:-beautybot}
      FLASK_APP: src.main:app
      POSTGRES_USER: ${POSTGRES_USER:-beautybot}
      POSTGRES_DB: ${POSTGRES_DB:-beautybot}
      PYTHONPATH: /app:/app/src
      PARSING_USE_PROXY_POOL: ${PARSING_USE_PROXY_POOL:-false}
      PROXY_FORCE_COUNTRY: ${PROXY_FORCE_COUNTRY:-}
      PROXY_COUNTRY_ROTATION: ${PROXY_COUNTRY_ROTATION:-}
      PROXY_MIN_HEALTH_SCORE: ${PROXY_MIN_HEALTH_SCORE:-0.25}
      YANDEX_CAPTCHA_WAIT_LOOPS: ${YANDEX_CAPTCHA_WAIT_LOOPS:-6}
      YANDEX_CAPTCHA_WAIT_MS: ${YANDEX_CAPTCHA_WAIT_MS:-5000}
      CAPTCHA_PAUSE_NETWORK_BATCH_ON_MASS: ${CAPTCHA_PAUSE_NETWORK_BATCH_ON_MASS:-true}
      CAPTCHA_BATCH_PAUSE_MINUTES: ${CAPTCHA_BATCH_PAUSE_MINUTES:-30}
      CAPTCHA_AUTO_RETRY_MAX_ATTEMPTS: ${CAPTCHA_AUTO_RETRY_MAX_ATTEMPTS:-4}
      PARSE_TASK_TTL_HOURS: ${PARSE_TASK_TTL_HOURS:-48}
      TASK_AGE_WARN_HOURS: ${TASK_AGE_WARN_HOURS:-12}
      WORKER_ENABLE_AI_ANALYSIS: ${WORKER_ENABLE_AI_ANALYSIS:-false}
      PROCESSING_STALE_MINUTES: ${PROCESSING_STALE_MINUTES:-10}
      TRANSIENT_PARSE_MAX_ATTEMPTS: ${TRANSIENT_PARSE_MAX_ATTEMPTS:-8}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      APIFY_YANDEX_ACTOR_ID: ${APIFY_YANDEX_ACTOR_ID:-}
      APIFY_2GIS_ACTOR_ID: ${APIFY_2GIS_ACTOR_ID:-}
      APIFY_TWOGIS_ACTOR_ID: ${APIFY_TWOGIS_ACTOR_ID:-}
      APIFY_PROXY_URL: ${APIFY_PROXY_URL:-}
      APIFY_HTTP_PROXY: ${APIFY_HTTP_PROXY:-}
      APIFY_HTTPS_PROXY: ${APIFY_HTTPS_PROXY:-}
      APIFY_PROXY_GROUPS: ${APIFY_PROXY_GROUPS:-RESIDENTIAL}
      APIFY_PROXY_STRICT: ${APIFY_PROXY_STRICT:-false}
    volumes:
      - ./debug_data:/app/debug_data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "src/worker.py"]

volumes:
  pgdata:
