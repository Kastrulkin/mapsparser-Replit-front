# Один и тот же compose для локального и серверного запуска.
# Postgres и приложение — в разных контейнерах; данные БД — в volume.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local}
      POSTGRES_DB: ${POSTGRES_DB:-local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-local} -d ${POSTGRES_DB:-local}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DEBUG_DIR: /app/debug_data
      DATABASE_URL: postgresql://${POSTGRES_USER:-local}:${POSTGRES_PASSWORD:-local}@postgres:5432/${POSTGRES_DB:-local}
      FLASK_APP: src.main:app
      POSTGRES_USER: ${POSTGRES_USER:-local}
      POSTGRES_DB: ${POSTGRES_DB:-local}
      PYTHONPATH: /app:/app/src
      DOCKER_HOST: unix:///var/run/docker.sock
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_HOST_OVERRIDE: host.docker.internal
      GIGACHAT_KEYS: ${GIGACHAT_KEYS:-}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-}
      GIGACHAT_SSL_VERIFY: ${GIGACHAT_SSL_VERIFY:-false}
      GIGACHAT_CA_BUNDLE: ${GIGACHAT_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      YANDEX_WORDSTAT_CLIENT_ID: ${YANDEX_WORDSTAT_CLIENT_ID:-}
      YANDEX_WORDSTAT_CLIENT_SECRET: ${YANDEX_WORDSTAT_CLIENT_SECRET:-}
      YANDEX_WORDSTAT_OAUTH_TOKEN: ${YANDEX_WORDSTAT_OAUTH_TOKEN:-}
      WORDSTAT_UPDATE_INTERVAL: ${WORDSTAT_UPDATE_INTERVAL:-604800}
      WORDSTAT_DEFAULT_REGION: ${WORDSTAT_DEFAULT_REGION:-225}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_YANDEX_ACTOR_ID: ${APIFY_YANDEX_ACTOR_ID:-${APIFY_ACTOR_ID:-}}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      OPENCLAW_LOCALOS_TOKEN: ${OPENCLAW_LOCALOS_TOKEN:-}
      OPENCLAW_CALLBACK_SIGNING_SECRET: ${OPENCLAW_CALLBACK_SIGNING_SECRET:-${OPENCLAW_LOCALOS_TOKEN:-}}
      OPENCLAW_SUPERADMIN_TELEGRAM_IDS: ${OPENCLAW_SUPERADMIN_TELEGRAM_IDS:-}
      OPENCLAW_OUTREACH_SEND_URL: ${OPENCLAW_OUTREACH_SEND_URL:-}
      OPENCLAW_OUTREACH_HEALTH_URL: ${OPENCLAW_OUTREACH_HEALTH_URL:-}
      OPENCLAW_OUTREACH_TOKEN: ${OPENCLAW_OUTREACH_TOKEN:-}
      OPENCLAW_OUTREACH_STRICT: ${OPENCLAW_OUTREACH_STRICT:-0}
      OPENCLAW_SANDBOX_BRIDGE_URL: ${OPENCLAW_SANDBOX_BRIDGE_URL:-}
      OPENCLAW_SANDBOX_BRIDGE_TOKEN: ${OPENCLAW_SANDBOX_BRIDGE_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/legacy.sqlite:/app/legacy.sqlite:ro
      - ./data/server_reports.db:/app/server_reports.db:ro
      - ./debug_data:/app/debug_data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["python", "src/main.py"]

  worker:
    build: .
    environment:
      DEBUG_DIR: /app/debug_data
      DATABASE_URL: postgresql://${POSTGRES_USER:-local}:${POSTGRES_PASSWORD:-local}@postgres:5432/${POSTGRES_DB:-local}
      FLASK_APP: src.main:app
      POSTGRES_USER: ${POSTGRES_USER:-local}
      POSTGRES_DB: ${POSTGRES_DB:-local}
      PYTHONPATH: /app:/app/src
      GIGACHAT_KEYS: ${GIGACHAT_KEYS:-}
      GIGACHAT_CLIENT_ID: ${GIGACHAT_CLIENT_ID:-}
      GIGACHAT_CLIENT_SECRET: ${GIGACHAT_CLIENT_SECRET:-}
      GIGACHAT_MODEL: ${GIGACHAT_MODEL:-}
      GIGACHAT_SSL_VERIFY: ${GIGACHAT_SSL_VERIFY:-false}
      GIGACHAT_CA_BUNDLE: ${GIGACHAT_CA_BUNDLE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      YANDEX_WORDSTAT_CLIENT_ID: ${YANDEX_WORDSTAT_CLIENT_ID:-}
      YANDEX_WORDSTAT_CLIENT_SECRET: ${YANDEX_WORDSTAT_CLIENT_SECRET:-}
      YANDEX_WORDSTAT_OAUTH_TOKEN: ${YANDEX_WORDSTAT_OAUTH_TOKEN:-}
      WORDSTAT_UPDATE_INTERVAL: ${WORDSTAT_UPDATE_INTERVAL:-604800}
      WORDSTAT_DEFAULT_REGION: ${WORDSTAT_DEFAULT_REGION:-225}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APIFY_TOKEN: ${APIFY_TOKEN:-}
      APIFY_YANDEX_ACTOR_ID: ${APIFY_YANDEX_ACTOR_ID:-${APIFY_ACTOR_ID:-}}
      APIFY_ACTOR_ID: ${APIFY_ACTOR_ID:-}
      OPENCLAW_LOCALOS_TOKEN: ${OPENCLAW_LOCALOS_TOKEN:-}
      OPENCLAW_CALLBACK_SIGNING_SECRET: ${OPENCLAW_CALLBACK_SIGNING_SECRET:-${OPENCLAW_LOCALOS_TOKEN:-}}
      OPENCLAW_SUPERADMIN_TELEGRAM_IDS: ${OPENCLAW_SUPERADMIN_TELEGRAM_IDS:-}
      OPENCLAW_OUTREACH_SEND_URL: ${OPENCLAW_OUTREACH_SEND_URL:-}
      OPENCLAW_OUTREACH_HEALTH_URL: ${OPENCLAW_OUTREACH_HEALTH_URL:-}
      OPENCLAW_OUTREACH_TOKEN: ${OPENCLAW_OUTREACH_TOKEN:-}
      OPENCLAW_OUTREACH_STRICT: ${OPENCLAW_OUTREACH_STRICT:-0}
      OPENCLAW_SANDBOX_BRIDGE_URL: ${OPENCLAW_SANDBOX_BRIDGE_URL:-}
      OPENCLAW_SANDBOX_BRIDGE_TOKEN: ${OPENCLAW_SANDBOX_BRIDGE_TOKEN:-}
      OPENCLAW_CALLBACK_DISPATCH_ENABLED: ${OPENCLAW_CALLBACK_DISPATCH_ENABLED:-true}
      OPENCLAW_CALLBACK_DISPATCH_INTERVAL_SEC: ${OPENCLAW_CALLBACK_DISPATCH_INTERVAL_SEC:-15}
      OPENCLAW_CALLBACK_DISPATCH_BATCH_SIZE: ${OPENCLAW_CALLBACK_DISPATCH_BATCH_SIZE:-50}
      OPENCLAW_BILLING_RECONCILE_ENABLED: ${OPENCLAW_BILLING_RECONCILE_ENABLED:-true}
      OPENCLAW_BILLING_RECONCILE_INTERVAL_SEC: ${OPENCLAW_BILLING_RECONCILE_INTERVAL_SEC:-900}
      OPENCLAW_BILLING_RECONCILE_WINDOW_MINUTES: ${OPENCLAW_BILLING_RECONCILE_WINDOW_MINUTES:-120}
      OPENCLAW_BILLING_RECONCILE_LIMIT: ${OPENCLAW_BILLING_RECONCILE_LIMIT:-200}
      OPENCLAW_BILLING_RECONCILE_MAX_TENANTS: ${OPENCLAW_BILLING_RECONCILE_MAX_TENANTS:-100}
      OPENCLAW_BILLING_RECONCILE_ALERT_ENABLED: ${OPENCLAW_BILLING_RECONCILE_ALERT_ENABLED:-true}
      OPENCLAW_BILLING_RECONCILE_ALERT_INTERVAL_SEC: ${OPENCLAW_BILLING_RECONCILE_ALERT_INTERVAL_SEC:-1800}
      OPENCLAW_BILLING_RECONCILE_ALERT_MIN_ISSUES: ${OPENCLAW_BILLING_RECONCILE_ALERT_MIN_ISSUES:-1}
    volumes:
      - ./debug_data:/app/debug_data
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "src/worker.py"]

volumes:
  pgdata:
